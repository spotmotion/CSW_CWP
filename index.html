<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cavalry Web Player – Creative Southwest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #viewport {
        position: relative;
        background: transparent;
      }

      canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: block;
      }
    </style>
  </head>

  <body>
    <div id="viewport">
      <canvas id="canvas"></canvas>
    </div>

    <script type="module">
      const log = (...args) => console.log("[CWP]", ...args)

      const canvas = document.getElementById("canvas")
      const viewport = document.getElementById("viewport")

      let SCENE_WIDTH = 1080
      let SCENE_HEIGHT = 1920

      let Module
      let app
      let surface
      let animationFrameId = 0
      let playbackLoopRunning = false

      function postToParent(message) {
        window.parent.postMessage(message, "*")
      }

      function emitFrameUpdate() {
        if (!app) return
        postToParent({
          type: "frame-update",
          currentFrame: app.getFrame(),
          startFrame: app.getStartFrame(),
          endFrame: app.getEndFrame(),
          isPlaying: app.isPlaying(),
        })
      }

      async function writeFile(module, path) {
        const response = await fetch(path)
        if (!response.ok) {
          throw new Error(`Failed to fetch ${path}: ${response.status} ${response.statusText}`)
        }
        const filename = path.split("/").pop()
        const asset = await response.arrayBuffer()
        module.FS.writeFile(filename, new Uint8Array(asset))
        return filename
      }

      function resizeViewportAndSurface() {
        if (!Module) return

        const winW = window.innerWidth
        const winH = window.innerHeight

        const compAspect = SCENE_WIDTH / SCENE_HEIGHT

        let renderW, renderH

        if (compAspect >= 1) {
          renderW = winW
          renderH = Math.round(winW / compAspect)
          if (renderH > winH) {
            renderH = winH
            renderW = Math.round(winH * compAspect)
          }
        } else {
          renderH = winH
          renderW = Math.round(winH * compAspect)
          if (renderW > winW) {
            renderW = winW
            renderH = Math.round(winW / compAspect)
          }
        }

        viewport.style.width = renderW + "px"
        viewport.style.height = renderH + "px"

        const dpr = window.devicePixelRatio || 1

        canvas.width = renderW * dpr
        canvas.height = renderH * dpr
        canvas.style.width = renderW + "px"
        canvas.style.height = renderH + "px"

        surface = Module.makeWebGLSurfaceFromElement(canvas, renderW * dpr, renderH * dpr)

        if (app && surface) {
          app.render(surface)
        }
      }

      function runPlaybackLoop() {
        if (!app || !surface) return
        if (playbackLoopRunning) return

        playbackLoopRunning = true

        function tick(time) {
          if (!app || !surface || !app.isPlaying()) {
            playbackLoopRunning = false
            animationFrameId = 0
            emitFrameUpdate()
            return
          }

          const status = app.tick(surface, time)

          if (status.frameChanged) {
            postToParent({
              type: "frame-update",
              currentFrame: status.currentFrame,
              startFrame: app.getStartFrame(),
              endFrame: app.getEndFrame(),
              isPlaying: true,
              fps: status.actualFPS,
            })
          }

          animationFrameId = requestAnimationFrame(tick)
        }

        animationFrameId = requestAnimationFrame(tick)
      }

      function stopPlaybackLoop() {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId)
        }
        animationFrameId = 0
        playbackLoopRunning = false
      }

      try {
        log("Importing CavalryWasm.js")
        const CavalryModule = await import("/CavalryWasm.js")

        log("Initialising module")
        Module = await CavalryModule.default({
          canvas,
          locateFile: (path) => `/wasm-lib/${path}`,
        })

        const loadedAssets = new Set()

        window.addEventListener("cavalryAutoLoadAsset", async (event) => {
          const { type, assetId, filename } = event.detail
          const key = `${assetId}:${filename}`
          if (loadedAssets.has(key)) {
            log("Skipping already-loaded asset:", filename)
            return
          }
          loadedAssets.add(key)

          if (type === "font") {
            log("Auto-loading font:", filename)
            const response = await fetch("/" + filename)
            if (!response.ok) throw new Error(`Failed to fetch font: ${filename}`)
            const data = await response.arrayBuffer()
            Module.FS.writeFile(filename, new Uint8Array(data))
            app.replaceFontAsset(filename, assetId)
            if (surface) app.render(surface)
            log("Font loaded:", filename)
          }

          if (type === "image") {
            log("Auto-loading image:", filename)
            const response = await fetch("/" + filename)
            if (!response.ok) throw new Error(`Failed to fetch image: ${filename}`)
            const data = await response.arrayBuffer()
            Module.FS.writeFile(filename, new Uint8Array(data))
            app.replaceImageAsset(filename, assetId)
            if (surface) app.render(surface)
            log("Image loaded:", filename)
          }
        })

        log("Loading scene: Spot_CSW_Case_Study.cv")
        const sceneFile = await writeFile(Module, "/scenes/Spot_CSW_Case_Study.cv")

        log("Creating app")
        app = Module.Cavalry.MakeWithPath(sceneFile)

        const res = app.getSceneResolution()
        if (res && res.width > 0 && res.height > 0) {
          SCENE_WIDTH = res.width
          SCENE_HEIGHT = res.height
          log("Scene resolution:", SCENE_WIDTH, "x", SCENE_HEIGHT)
        }

        resizeViewportAndSurface()
        window.addEventListener("resize", resizeViewportAndSurface)

        // Start paused on frame 0
        app.setFrame(0)
        app.setLoop(true)
        if (surface) app.render(surface)

        // Notify parent that the player is ready
        postToParent({
          type: "player-ready",
          startFrame: app.get
